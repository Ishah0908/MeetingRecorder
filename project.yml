name: MeetingRecorder

options:
  bundleIdPrefix: com.meetingrecorder
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  MeetingRecorder:
    type: application
    platform: macOS
    sources:
      - path: MeetingRecorder
    entitlements:
      path: MeetingRecorder/MeetingRecorder.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    info:
      path: MeetingRecorder/Info.plist
      properties:
        CFBundleName: MeetingRecorder
        CFBundleDisplayName: MeetingRecorder
        CFBundleIdentifier: com.meetingrecorder.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSMicrophoneUsageDescription: "MeetingRecorder needs microphone access to record your voice during calls."
        NSScreenCaptureDescription: "MeetingRecorder needs Screen Recording access to capture system audio from calls."
        NSSpeechRecognitionUsageDescription: "MeetingRecorder uses speech recognition to transcribe your recorded meetings to text."
        LSMinimumSystemVersion: "15.0"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingrecorder.app
        # Sign with a STABLE Apple Development identity (not ad-hoc).
        # Ad-hoc signatures change on every rebuild, which makes macOS forget
        # granted Screen Recording / Speech / Microphone permissions and
        # re-prompt endlessly. A real signing identity keeps the grant stable.
        # Manual signing is used because this app is run locally, not
        # distributed — macOS dev-signed apps don't need a provisioning profile.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "FCA42E323914AB830BBA766A39230C35D2878E0F"
        PROVISIONING_PROFILE_SPECIFIER: ""
